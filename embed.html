<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex">
  <title>Instagram embed</title>
  <link rel="stylesheet" href="embed.css">
</head>
<body>
  <main class="ig-embed-wrap" id="root" aria-live="polite"></main>

<script>
(function () {
  const root = document.getElementById('root');
  const params = new URLSearchParams(location.search);

  const clean = (value, fallback = '') => {
    const text = String(value || '').trim();
    return text || fallback;
  };

  function normalizeInstagramUrl(raw) {
    let value = clean(raw);
    if (!value) return '';
    if (!/^https?:\/\//i.test(value)) value = 'https://' + value;
    try {
      const url = new URL(value);
      const host = url.hostname.replace(/^www\./, '').toLowerCase();
      if (host === 'kkinstagram.com' || host.endsWith('.kkinstagram.com')) {
        url.hostname = 'www.instagram.com';
      }
      return url.toString();
    } catch (e) {
      return value;
    }
  }

  function getShortcode(raw) {
    try {
      const url = new URL(raw);
      const match = url.pathname.match(/\/(reel|p|tv)\/([^/?#]+)/i);
      return match ? match[2] : '';
    } catch (e) {
      const match = String(raw || '').match(/\/(?:reel|p|tv)\/([^/?#]+)/i);
      return match ? match[1] : '';
    }
  }

  const originalUrl = clean(params.get('u') || params.get('url'));
  const shortcode = getShortcode(originalUrl || location.href);
  const officialUrl = normalizeInstagramUrl(originalUrl);

  const data = {
    url: officialUrl || originalUrl,
    sourceUrl: originalUrl,
    shortcode,
    author: clean(params.get('author') || params.get('a')),
    caption: clean(params.get('caption') || params.get('c')),
    cover: clean(params.get('cover') || params.get('img'))
  };

  async function enrichFromLocalJson(item) {
    if (!item.shortcode) return item;
    try {
      const res = await fetch('instagram-embeds.json', { cache: 'no-store' });
      if (!res.ok) return item;
      const json = await res.json();
      const local = json[item.shortcode] || {};
      return Object.assign({}, local, item, {
        author: item.author || local.author || '',
        caption: item.caption || local.caption || '',
        cover: item.cover || local.cover || '',
        url: item.url || local.url || ''
      });
    } catch (e) {
      return item;
    }
  }

  function escapeAttr(value) {
    return String(value || '').replace(/[&<>"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]));
  }

  function render(item) {
    const openUrl = item.url || item.sourceUrl || 'https://www.instagram.com/';
    const author = clean(item.author, item.shortcode ? '@' + item.shortcode : 'Instagram Reel');
    const caption = clean(item.caption, 'Открыть оригинал в Instagram. Если превью недоступно, карточка всё равно остаётся стабильной.');
    const cover = clean(item.cover);
    document.title = author + ' — Instagram embed';

    root.innerHTML = `
      <article class="ig-card">
        <a class="ig-cover" href="${escapeAttr(openUrl)}" target="_blank" rel="noopener noreferrer" aria-label="Открыть в Instagram">
          ${cover ? `<img src="${escapeAttr(cover)}" alt="" loading="lazy" onerror="this.remove();document.documentElement.classList.add('ig-cover-error')">` : ''}
          <div class="ig-cover-placeholder" aria-hidden="true">
            <div>
              <div class="ig-mark"></div>
              <div class="ig-placeholder-title">Instagram Reel</div>
            </div>
          </div>
          <div class="ig-badge">Instagram</div>
          <div class="ig-play" aria-hidden="true">
            <svg width="23" height="23" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          </div>
        </a>
        <div class="ig-body">
          <div class="ig-platform"><span class="ig-dot"></span><span>Instagram preview</span></div>
          <h1 class="ig-author">${escapeAttr(author)}</h1>
          <p class="ig-caption">${escapeAttr(caption)}</p>
          ${item.shortcode ? `<div class="ig-shortcode">/${escapeAttr(item.shortcode)}</div>` : ''}
          <div class="ig-card-actions">
            <a class="ig-open" href="${escapeAttr(openUrl)}" target="_blank" rel="noopener noreferrer">Открыть в Instagram</a>
          </div>
          <p class="ig-note">Это стабильная preview-карточка, а не iframe Instagram. Видео и приватный контент не копируются.</p>
        </div>
      </article>
    `;

    sendHeight();
  }

  function sendHeight() {
    requestAnimationFrame(() => {
      const height = Math.ceil(document.documentElement.scrollHeight);
      try { parent.postMessage({ type: 'ig-embed-height', height }, '*'); } catch(e) {}
    });
  }

  window.addEventListener('load', sendHeight);
  window.addEventListener('resize', sendHeight);
  enrichFromLocalJson(data).then(render);
})();
</script>
</body>
</html>
