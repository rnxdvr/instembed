<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Instagram/Reels Embed Generator</title>
  <meta name="description" content="Генератор стабильных preview embed-карточек для Instagram/Reels.">
  <link rel="stylesheet" href="embed.css">
</head>
<body>
  <main class="ig-page">
    <div class="ig-shell">
      <header class="ig-hero">
        <h1 class="ig-title">Instagram/Reels Embed Generator</h1>
        <p class="ig-lead">Вставь ссылку на Reel/Post, добавь подпись и обложку при желании — получишь нормальную ссылку на embed-страницу и iframe-код для вставки на сайт.</p>
      </header>

      <section class="ig-panel ig-grid">
        <div>
          <div class="form-row">
            <label for="ig-url">Ссылка Instagram / kkinstagram</label>
            <input class="input" id="ig-url" placeholder="https://www.kkinstagram.com/reel/DYikItvvxgP/" autocomplete="off">
          </div>

          <div class="form-row">
            <label for="ig-author">Автор / заголовок</label>
            <input class="input" id="ig-author" placeholder="Например: @username или короткий заголовок">
          </div>

          <div class="form-row">
            <label for="ig-caption">Описание</label>
            <textarea id="ig-caption" placeholder="Короткая подпись, которая будет видна в карточке"></textarea>
          </div>

          <div class="form-row">
            <label for="ig-cover">URL обложки, если есть</label>
            <input class="input" id="ig-cover" placeholder="https://.../cover.jpg или assets/ig/DYikItvvxgP.jpg" autocomplete="off">
          </div>

          <div class="actions">
            <button class="btn btn-primary" id="make">Сделать embed</button>
            <button class="btn btn-secondary" id="clear" type="button">Очистить</button>
          </div>

          <div class="result-box" id="result" hidden>
            <div>
              <div class="code-label"><span>Готовая ссылка на embed</span><button class="copy-btn" data-copy="link">Скопировать</button></div>
              <div class="code-box" id="out-link"></div>
            </div>
            <div>
              <div class="code-label"><span>iframe-код для сайта</span><button class="copy-btn" data-copy="iframe">Скопировать</button></div>
              <div class="code-box" id="out-iframe"></div>
            </div>
            <div>
              <div class="code-label"><span>HTML-ссылка</span><button class="copy-btn" data-copy="html">Скопировать</button></div>
              <div class="code-box" id="out-html"></div>
            </div>
          </div>
        </div>

        <div>
          <iframe class="preview-frame" id="preview" title="Preview" src="embed.html?u=https%3A%2F%2Fwww.kkinstagram.com%2Freel%2FDYikItvvxgP%2F&author=Instagram%20Reel&caption=%D0%9F%D1%80%D0%B8%D0%BC%D0%B5%D1%80%20%D1%81%D1%82%D0%B0%D0%B1%D0%B8%D0%BB%D1%8C%D0%BD%D0%BE%D0%B9%20preview-%D0%BA%D0%B0%D1%80%D1%82%D0%BE%D1%87%D0%BA%D0%B8" loading="lazy"></iframe>
        </div>
      </section>
    </div>
  </main>

<script>
(function () {
  const $ = (id) => document.getElementById(id);
  const inputUrl = $('ig-url');
  const inputAuthor = $('ig-author');
  const inputCaption = $('ig-caption');
  const inputCover = $('ig-cover');
  const result = $('result');
  const outLink = $('out-link');
  const outIframe = $('out-iframe');
  const outHtml = $('out-html');
  const preview = $('preview');

  const DEFAULT_URL = 'https://www.kkinstagram.com/reel/DYikItvvxgP/';

  function makeEmbedUrl() {
    const embed = new URL('embed.html', location.href);
    const source = inputUrl.value.trim() || DEFAULT_URL;
    embed.searchParams.set('u', source);
    if (inputAuthor.value.trim()) embed.searchParams.set('author', inputAuthor.value.trim());
    if (inputCaption.value.trim()) embed.searchParams.set('caption', inputCaption.value.trim());
    if (inputCover.value.trim()) embed.searchParams.set('cover', inputCover.value.trim());
    return embed.toString();
  }

  function escapeHtml(value) {
    return String(value || '').replace(/[&<>"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]));
  }

  function generate() {
    const link = makeEmbedUrl();
    const iframe = `<iframe src="${escapeHtml(link)}" width="430" height="650" style="border:0;max-width:100%;border-radius:24px;overflow:hidden;" loading="lazy" referrerpolicy="no-referrer-when-downgrade" allow="clipboard-write" title="Instagram preview"></iframe>`;
    const html = `<a href="${escapeHtml(link)}" target="_blank" rel="noopener noreferrer">Открыть Instagram preview</a>`;
    outLink.textContent = link;
    outIframe.textContent = iframe;
    outHtml.textContent = html;
    preview.src = link;
    result.hidden = false;
  }

  async function copyText(kind, button) {
    const map = { link: outLink, iframe: outIframe, html: outHtml };
    const text = map[kind]?.textContent || '';
    if (!text) return;
    try {
      await navigator.clipboard.writeText(text);
      const old = button.textContent;
      button.textContent = 'Готово';
      setTimeout(() => button.textContent = old, 1100);
    } catch (e) {
      alert('Не удалось скопировать автоматически. Выдели текст вручную.');
    }
  }

  $('make').addEventListener('click', generate);
  $('clear').addEventListener('click', () => {
    inputUrl.value = '';
    inputAuthor.value = '';
    inputCaption.value = '';
    inputCover.value = '';
    result.hidden = true;
  });
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-copy]');
    if (btn) copyText(btn.dataset.copy, btn);
  });

  inputUrl.value = DEFAULT_URL;
  generate();
})();
</script>
</body>
</html>
